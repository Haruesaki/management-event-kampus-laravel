[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_sqlite",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.tokenizer",
  "php82Extensions.fileinfo",
  "composer",
  "nodejs_20",
  "npm"
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "mkdir -p /app/database && touch /app/database/database.sqlite && chmod -R 775 storage bootstrap/cache && php artisan migrate --force && php artisan db:seed --force 2>/dev/null || true && php artisan cache:clear && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
